{% extends "accounts/base.html" %}

{% block content %}
  <section class="card">
    <h2>Reset Password</h2>
    <form method="post">
      {% csrf_token %}
      <label>Email address</label>
      <input type="email" name="email" value="{{ data.email|default:'' }}" required />
      <button type="submit">Send reset link</button>
    </form>
    {% if errors %}
      <div class="errors">
        <pre>{{ errors }}</pre>
      </div>
    {% endif %}
  </section>
{% endblock %}
